<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดินแดนการ์ตูนหรรษา - Kiddo Land</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #FFF9E1;
            overflow-x: hidden;
        }

        .kid-button {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .kid-button:active {
            transform: scale(0.9);
        }

        .card-pop {
            transition: transform 0.3s ease;
        }
        .card-pop:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .text-orange-kid { color: #FF922B; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        /* สไตล์ Sidebar ด้านซ้าย */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 150;
        }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }

        .search-container {
            position: relative;
            max-width: 500px;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px 10px 45px;
            border-radius: 9999px;
            border: 3px solid #FDE047;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }
        @media (min-width: 640px) {
            .search-input { padding: 12px 20px 12px 50px; border-width: 4px; font-size: 1.1rem; }
        }

        /* ปุ่มเปลี่ยนหน้า */
        .page-btn {
            background-color: #ffffff;
            border: 3px solid #FDE047;
            border-radius: 9999px;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            color: #FF922B;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #FDE047;
            color: white;
            transform: scale(1.05);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* สไตล์ไอคอนหมวดหมู่ใน Sidebar */
        .cat-item-side {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            width: 100%;
            border-radius: 1rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }
        .cat-item-side.active {
            background-color: #FF922B;
            color: white;
        }

        /* Overlay โปร่งใสสำหรับตรวจจับ Touch Swipe บนเครื่องเล่น */
        .swipe-overlay {
            position: absolute;
            inset: 0;
            z-index: 50; /* อยู่เหนือ YouTube เล็กน้อยเพื่อจับ Touch แต่ยังยอมให้กด UI ของ YouTube ได้ถ้าจำเป็น */
            pointer-events: auto;
        }
    </style>
</head>
<body class="pb-24">

    <!-- พื้นหลัง -->
    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none" 
         style="background-image: radial-gradient(#FF922B 1px, transparent 1px); background-size: 30px 30px;">
    </div>

    <!-- หัวเว็บ -->
    <header class="bg-white border-b-4 border-yellow-400 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <button onclick="toggleSidebar()" class="kid-button bg-yellow-400 text-white p-2 rounded-2xl border-b-4 border-yellow-600 order-first">
                <i data-lucide="menu" class="w-6 h-6 sm:w-8 sm:h-8"></i>
            </button>

            <h1 class="text-xl sm:text-3xl font-bold text-orange-kid flex items-center gap-2 cursor-pointer" onclick="goHome()">
                <span class="text-2xl sm:text-4xl floating">🌟</span>
                <span class="hidden sm:inline">ดินแดนการ์ตูนหรรษา</span>
                <span class="sm:hidden">Kiddo Land</span>
            </h1>
            
            <div class="search-container flex-grow max-w-[300px] sm:max-w-[500px]">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 w-5 h-5"></i>
                <input type="text" id="search-input" placeholder="ค้นหาการ์ตูน..." class="search-input" oninput="handleSearch()">
            </div>
        </div>
    </header>

    <!-- Sidebar หมวดหมู่ด้านซ้าย -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-[140] hidden" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 sm:w-80 bg-white border-r-8 border-yellow-400 z-[150] sidebar-closed overflow-y-auto p-6 flex flex-col">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-orange-kid">เลือกหมวดหมู่</h2>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-full">
                <i data-lucide="x" class="w-8 h-8 text-gray-400"></i>
            </button>
        </div>
        <div id="category-list-side" class="flex flex-col">
            <!-- สร้างด้วย JS -->
        </div>
    </div>

    <!-- เนื้อหาหลัก -->
    <main class="max-w-7xl mx-auto px-2 sm:px-4 pt-4 sm:pt-6">
        
        <div class="flex items-center gap-2 mb-4 px-2">
            <span id="current-cat-display" class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-sm font-bold uppercase">หมวดหมู่: ทั้งหมด</span>
            <span id="result-count" class="text-gray-400 text-xs sm:text-sm">กำลังโหลด...</span>
        </div>

        <div id="video-grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6">
            <!-- สร้างด้วย JS -->
        </div>

        <div id="pagination-controls" class="flex items-center justify-center gap-4 mt-12 mb-8">
            <button id="prev-page" onclick="changePage(-1)" class="page-btn">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span>ย้อนกลับ</span>
            </button>
            <span id="page-info" class="font-bold text-orange-kid text-lg">หน้า 1 / 1</span>
            <button id="next-page" onclick="changePage(1)" class="page-btn">
                <span>ถัดไป</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-20 text-orange-kid">
            <div class="w-12 h-12 sm:w-16 sm:h-16 border-4 sm:border-8 border-orange-200 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-lg sm:text-xl">กำลังหาการ์ตูนสนุกๆ นะ...</p>
        </div>
    </main>

    <!-- เมนูด้านล่าง -->
    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-white border-4 border-yellow-400 rounded-full shadow-2xl z-50 flex justify-around p-1 sm:p-2">
        <button onclick="goHome()" class="flex flex-col items-center p-2 text-orange-kid hover:bg-yellow-50 rounded-full flex-1">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">บ้านของหนู</span>
        </button>
        <button onclick="openFavsSide()" class="flex flex-col items-center p-2 text-pink-500 hover:bg-pink-50 rounded-full flex-1">
            <i data-lucide="heart" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">ที่หนูชอบ</span>
        </button>
        <button onclick="window.location.reload()" class="flex flex-col items-center p-2 text-blue-500 hover:bg-blue-50 rounded-full flex-1">
            <i data-lucide="refresh-cw" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">ดูใหม่</span>
        </button>
    </nav>

    <!-- หน้าต่างเล่นการ์ตูน (รองรับ Swipe) -->
    <div id="video-modal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-1 sm:p-4">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" onclick="closeModal()"></div>
        <div id="modal-container" class="relative bg-white border-[6px] sm:border-[12px] border-yellow-400 rounded-[2rem] sm:rounded-[3.5rem] overflow-hidden w-full max-w-5xl shadow-2xl">
            <button onclick="closeModal()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-2 z-[210] border-2 border-white shadow-lg">
                <i data-lucide="x" class="w-6 h-6 sm:w-8 sm:h-8"></i>
            </button>
            
            <div class="relative aspect-video bg-black flex items-center justify-center" id="swipe-area">
                <!-- Overlay สำหรับตรวจจับการปัดนิ้ว -->
                <div class="swipe-overlay"></div>
                <div id="player-container" class="w-full h-full"></div>
            </div>

            <div class="p-4 sm:p-8 bg-white text-center relative flex flex-col items-center gap-4">
                <div class="flex items-center justify-between w-full px-2 sm:px-8">
                    <button id="modal-prev" onclick="playPrev()" class="p-3 bg-white border-4 border-orange-400 rounded-full text-orange-400 hover:bg-orange-50 active:scale-90 transition-all z-[210]">
                        <i data-lucide="chevron-left" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                    </button>
                    <div class="flex flex-col items-center gap-1">
                        <h2 id="modal-title" class="text-base sm:text-2xl font-bold text-orange-kid line-clamp-1 max-w-[200px] sm:max-w-md uppercase">ชื่อการ์ตูน</h2>
                        <span class="text-[10px] text-gray-400 sm:hidden">ปัดซ้ายหรือขวาเพื่อเปลี่ยนคลิปได้นะจ๊ะ</span>
                    </div>
                    <button id="modal-next" onclick="playNext()" class="p-3 bg-white border-4 border-orange-400 rounded-full text-orange-400 hover:bg-orange-50 active:scale-90 transition-all z-[210]">
                        <i data-lucide="chevron-right" class="w-6 h-6 sm:w-10 sm:h-10"></i>
                    </button>
                </div>
                <button id="modal-fav-btn" onclick="toggleFavoriteCurrent()" class="kid-button bg-pink-400 text-white px-8 py-2 rounded-full font-bold flex items-center gap-2">
                    <i data-lucide="heart" class="w-6 h-6"></i>
                    <span>ชอบเรื่องนี้จัง</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9QPKOt_ptK8_1ykIQOV--jL4yGlpd6NTxBt84w_NpTswUyBKbUZoMA8r2fsAXJ8NP1XZSlUO5WJ_T/pub?output=csv";

        let allVideos = [];
        let filteredVideos = [];
        let currentPlaylist = [];
        let currentIndex = -1;
        let favorites = JSON.parse(localStorage.getItem('kiddo_favs') || '[]');
        let currentVideo = null;
        let player = null;
        let currentCategory = 'ทั้งหมด';
        let searchQuery = '';
        
        // Pagination
        let currentPage = 1;
        const itemsPerPage = 20;

        // Swipe Variables
        let touchStartX = 0;
        let touchEndX = 0;

        lucide.createIcons();

        function getIconForCategory(cat) {
            const map = {
                'ทั้งหมด': 'layout-grid',
                'ของเล่นเด็ก': 'toy-brick',
                'ของเล่น': 'toy-brick',
                'เพลง': 'music',
                'ความรู้': 'lightbulb',
                'รายการโปรด': 'star',
                'แนะนำ': 'heart'
            };
            return map[cat] || 'play-circle';
        }

        function extractID(url) {
            if (!url) return null;
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^?&"'>\s]+)/);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result;
        }

        async function fetchVideos() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
                allVideos = rows.slice(1).map((row, index) => {
                    const cols = parseCSVLine(row);
                    const videoId = extractID(cols[2] || '');
                    return {
                        id: 'v_' + index,
                        category: (cols[0] || 'ทั่วไป').replace(/^"|"$/g, ''),
                        title: (cols[1] || 'การ์ตูนสนุกๆ').replace(/^"|"$/g, ''),
                        videoId,
                        thumbnail: videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : null
                    };
                }).filter(v => v.videoId !== null);
                document.getElementById('loader').style.display = 'none';
                renderCategoriesSide();
                applyFilters();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold">โหลดข้อมูลไม่ได้จ้า ลองรีเฟรชใหม่นะ</p>`;
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('sidebar-closed')) {
                sidebar.classList.remove('sidebar-closed');
                sidebar.classList.add('sidebar-open');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('sidebar-open');
                sidebar.classList.add('sidebar-closed');
                overlay.classList.add('hidden');
            }
        }

        function renderCategoriesSide() {
            const cats = ['ทั้งหมด', ...new Set(allVideos.map(v => v.category)), 'รายการโปรด'];
            const container = document.getElementById('category-list-side');
            container.innerHTML = cats.map(cat => {
                const icon = getIconForCategory(cat);
                const isActive = currentCategory === cat;
                return `
                    <button onclick="setCategory('${cat}')" class="cat-item-side ${isActive ? 'active' : 'hover:bg-yellow-50 text-gray-600'}">
                        <i data-lucide="${icon}" class="w-6 h-6"></i>
                        <span class="font-bold">${cat}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function setCategory(cat) {
            currentCategory = cat;
            currentPage = 1;
            document.getElementById('current-cat-display').textContent = `หมวดหมู่: ${cat}`;
            renderCategoriesSide();
            applyFilters();
            toggleSidebar();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            currentPage = 1;
            applyFilters();
        }

        function applyFilters() {
            filteredVideos = allVideos;
            if (currentCategory !== 'ทั้งหมด' && currentCategory !== 'รายการโปรด') {
                filteredVideos = filteredVideos.filter(v => v.category === currentCategory);
            } else if (currentCategory === 'รายการโปรด') {
                filteredVideos = allVideos.filter(v => favorites.includes(v.id));
            }
            if (searchQuery) {
                filteredVideos = filteredVideos.filter(v => v.title.toLowerCase().includes(searchQuery));
            }
            document.getElementById('result-count').textContent = `เจอการ์ตูน ${filteredVideos.length} เรื่อง`;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageData = filteredVideos.slice(startIndex, startIndex + itemsPerPage);
            currentPlaylist = pageData;

            if (filteredVideos.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-gray-400 font-bold text-lg sm:text-xl">หาไม่เจอเลยจ๊ะ ลองหาเรื่องอื่นนะ! 🧸</div>';
                document.getElementById('pagination-controls').style.display = 'none';
                return;
            }

            document.getElementById('pagination-controls').style.display = 'flex';
            grid.innerHTML = pageData.map((v, idx) => `
                <div class="card-pop cursor-pointer h-full" onclick="playVideoAtIndex(${idx})">
                    <div class="bg-white border-[4px] sm:border-[6px] border-white rounded-[1.5rem] sm:rounded-[2.5rem] overflow-hidden shadow-lg h-full flex flex-col transition-all hover:shadow-2xl">
                        <div class="relative aspect-video bg-gray-100">
                            <img src="${v.thumbnail}" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute inset-0 flex items-center justify-center sm:opacity-0 sm:hover:opacity-100 transition-opacity">
                                <div class="bg-white/90 rounded-full p-2 sm:p-4 shadow-lg">
                                    <i data-lucide="play" class="w-5 h-5 sm:w-8 sm:h-8 text-orange-kid fill-current"></i>
                                </div>
                            </div>
                        </div>
                        <div class="p-2 sm:p-5 text-center flex-grow flex flex-col justify-between">
                            <h3 class="font-bold text-xs sm:text-lg text-gray-700 line-clamp-2 mb-1 sm:mb-2 leading-tight">${v.title}</h3>
                            <span class="inline-block px-2 sm:px-4 py-0.5 sm:py-1 bg-yellow-100 text-orange-600 rounded-full text-[10px] sm:text-xs font-bold self-center">${v.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            updatePaginationInfo();
            lucide.createIcons();
        }

        function updatePaginationInfo() {
            const totalPages = Math.ceil(filteredVideos.length / itemsPerPage) || 1;
            document.getElementById('page-info').textContent = `หน้า ${currentPage} / ${totalPages}`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            currentPage += delta;
            renderGrid();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function playVideoAtIndex(index) {
            if (index < 0 || index >= currentPlaylist.length) return;
            currentIndex = index;
            const video = currentPlaylist[currentIndex];
            currentVideo = video;
            document.getElementById('modal-title').textContent = video.title;
            document.getElementById('video-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            if (!player) {
                player = new YT.Player('player-container', {
                    height: '100%', width: '100%', videoId: video.videoId,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin, 'fs': 1 },
                    events: { 'onStateChange': (event) => { if (event.data === YT.PlayerState.ENDED) playNext(); } }
                });
            } else player.loadVideoById(video.videoId);
            updateFavBtn();
        }

        function playNext() {
            if (currentIndex < currentPlaylist.length - 1) playVideoAtIndex(currentIndex + 1);
            else playVideoAtIndex(0);
        }

        function playPrev() {
            if (currentIndex > 0) playVideoAtIndex(currentIndex - 1);
            else playVideoAtIndex(currentPlaylist.length - 1);
        }

        function closeModal() {
            document.getElementById('video-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            if (player) player.stopVideo();
        }

        function goHome() {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            setCategory('ทั้งหมด');
        }

        function toggleFavoriteCurrent() {
            const idx = favorites.indexOf(currentVideo.id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(currentVideo.id);
            localStorage.setItem('kiddo_favs', JSON.stringify(favorites));
            updateFavBtn();
            applyFilters();
        }

        function updateFavBtn() {
            const isFav = favorites.includes(currentVideo.id);
            const btn = document.getElementById('modal-fav-btn');
            btn.className = `kid-button ${isFav ? 'bg-pink-600' : 'bg-pink-400'} text-white px-8 py-2 rounded-full font-bold flex items-center gap-2`;
            btn.querySelector('span').textContent = isFav ? 'หนูชอบเรื่องนี้มาก' : 'ชอบเรื่องนี้จัง';
        }

        function openFavsSide() {
            setCategory('รายการโปรด');
        }

        // --- เพิ่มระบบ Swipe Gestures ---
        const swipeArea = document.getElementById('modal-container');
        
        swipeArea.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        swipeArea.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const threshold = 60; // ระยะขั้นต่ำในการปัด (พิกเซล)
            if (touchStartX - touchEndX > threshold) {
                // ปัดซ้าย -> เล่นคลิปถัดไป
                playNext();
            } else if (touchEndX - touchStartX > threshold) {
                // ปัดขวา -> เล่นคลิปก่อนหน้า
                playPrev();
            }
        }

        window.onload = fetchVideos;
    </script>
</body>
</html>
