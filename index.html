<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดินแดนการ์ตูนหรรษา - Kiddo Land</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #FFF9E1;
            overflow-x: hidden;
        }

        .kid-button {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #E2C33D;
        }
        .kid-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #E2C33D;
        }

        .card-pop {
            transition: transform 0.3s ease;
        }
        .card-pop:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .text-orange-kid { color: #FF922B; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 9999px;
            padding: 1.25rem;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
            border: 4px solid #FF922B;
        }
        .nav-btn:hover {
            transform: scale(1.15);
            background-color: #ffffff;
        }
    </style>
</head>
<body class="pb-24">

    <!-- พื้นหลังลายจุด -->
    <div class="fixed inset-0 z-[-1] opacity-20 pointer-events-none" 
         style="background-image: radial-gradient(#FF922B 1px, transparent 1px); background-size: 30px 30px;">
    </div>

    <!-- ส่วนหัว -->
    <header class="bg-white border-b-4 border-yellow-400 p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col items-center gap-2">
            <h1 class="text-3xl sm:text-4xl font-bold text-orange-kid flex items-center gap-3 cursor-pointer" onclick="goHome()">
                <span class="text-4xl sm:text-5xl floating">🌟</span>
                ดินแดนการ์ตูนหรรษา
                <span class="text-4xl sm:text-5xl floating" style="animation-delay: 0.5s;">🧸</span>
            </h1>
            <p class="text-gray-500 text-sm sm:text-base font-medium">ดูการ์ตูนต่อเนื่อง แถวละ 4 คลิปจุใจ!</p>
        </div>
    </header>

    <!-- คอนเทนต์หลัก -->
    <main class="max-w-7xl mx-auto px-4 pt-6">
        
        <!-- หมวดหมู่ -->
        <div id="category-bar" class="flex overflow-x-auto gap-3 py-4 hide-scrollbar justify-center mb-4">
            <!-- สร้างด้วย JS -->
        </div>

        <!-- รายการวิดีโอ (4 คลิปต่อแถว) -->
        <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-4">
            <!-- สร้างด้วย JS -->
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-20 text-orange-kid">
            <div class="w-16 h-16 border-8 border-orange-200 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-xl">กำลังหาการ์ตูนสนุกๆ มาให้หนูนะ...</p>
        </div>
    </main>

    <!-- เมนูด้านล่าง -->
    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white border-4 border-yellow-400 rounded-full shadow-2xl z-50 flex justify-around p-2">
        <button onclick="goHome()" class="flex flex-col items-center p-2 text-orange-kid hover:bg-yellow-50 rounded-full transition-all">
            <i data-lucide="home" class="w-8 h-8"></i>
            <span class="text-xs font-bold">บ้านของหนู</span>
        </button>
        <button onclick="openFavs()" class="flex flex-col items-center p-2 text-pink-500 hover:bg-pink-50 rounded-full transition-all">
            <i data-lucide="heart" class="w-8 h-8"></i>
            <span class="text-xs font-bold">ที่หนูชอบ</span>
        </button>
        <button onclick="window.location.reload()" class="flex flex-col items-center p-2 text-blue-500 hover:bg-blue-50 rounded-full transition-all">
            <i data-lucide="refresh-cw" class="w-8 h-8"></i>
            <span class="text-xs font-bold">ดูใหม่</span>
        </button>
    </nav>

    <!-- Modal เครื่องเล่นการ์ตูน -->
    <div id="video-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-2 sm:p-4">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative bg-white border-[8px] sm:border-[12px] border-yellow-400 rounded-[2.5rem] sm:rounded-[3.5rem] overflow-hidden w-full max-w-5xl shadow-2xl">
            
            <button onclick="closeModal()" class="absolute top-3 right-3 bg-red-500 text-white rounded-full p-2 sm:p-4 z-[110] shadow-lg hover:scale-110 active:scale-95 transition-transform border-4 border-white">
                <i data-lucide="x" class="w-6 h-6 sm:w-8 sm:h-8"></i>
            </button>
            
            <div class="relative aspect-video bg-black flex items-center justify-center">
                <div id="player-container" class="w-full h-full"></div>
                
                <div class="absolute inset-y-0 left-0 flex items-center pl-2 sm:pl-6 pointer-events-none">
                    <button id="prev-btn" onclick="playPrev()" class="nav-btn text-orange-kid pointer-events-auto">
                        <i data-lucide="chevron-left" class="w-8 h-8 sm:w-12 sm:h-12 stroke-[3px]"></i>
                    </button>
                </div>
                <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:pr-6 pointer-events-none">
                    <button id="next-btn" onclick="playNext()" class="nav-btn text-orange-kid pointer-events-auto">
                        <i data-lucide="chevron-right" class="w-8 h-8 sm:w-12 sm:h-12 stroke-[3px]"></i>
                    </button>
                </div>
            </div>
            
            <div class="p-4 sm:p-8 bg-white text-center">
                <h2 id="modal-title" class="text-xl sm:text-3xl font-bold text-orange-kid mb-4 line-clamp-1 px-12">ชื่อการ์ตูน</h2>
                <div class="flex justify-center">
                    <button id="modal-fav-btn" onclick="toggleFavoriteCurrent()" class="kid-button bg-pink-400 text-white px-10 py-3 rounded-full font-bold flex items-center gap-3 text-lg transition-all">
                        <i data-lucide="heart" class="w-7 h-7"></i>
                        <span>เก็บไว้ดูอีกนะ</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9QPKOt_ptK8_1ykIQOV--jL4yGlpd6NTxBt84w_NpTswUyBKbUZoMA8r2fsAXJ8NP1XZSlUO5WJ_T/pub?output=csv";

        let allVideos = [];
        let currentPlaylist = [];
        let currentIndex = -1;
        let favorites = JSON.parse(localStorage.getItem('kiddo_favs') || '[]');
        let currentVideo = null;
        let player = null;

        lucide.createIcons();

        // ฟังก์ชันดึง ID จาก URL ที่รองรับได้หลากหลายขึ้น
        function extractID(url) {
            if (!url) return null;
            // รองรับทั้ง youtu.be/ID และ youtube.com/watch?v=ID
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^?&"'>\s]+)/);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        // ฟังก์ชันแยก CSV ที่รองรับเครื่องหมายคำพูดและตัวอักษรพิเศษ
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        async function fetchVideos() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Fetch failed');
                const data = await response.text();
                
                // แยกบรรทัดและลบช่องว่างส่วนเกิน
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");
                const dataRows = rows.slice(1); // ข้ามหัวตาราง

                allVideos = dataRows.map((row, index) => {
                    const cols = parseCSVLine(row);
                    const category = (cols[0] || 'ทั่วไป').replace(/^"|"$/g, '');
                    const title = (cols[1] || 'การ์ตูนสนุกๆ').replace(/^"|"$/g, '');
                    const url = (cols[2] || '').replace(/^"|"$/g, '');
                    const videoId = extractID(url);

                    return {
                        id: 'v_' + index,
                        category,
                        title,
                        videoId,
                        thumbnail: videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : null
                    };
                }).filter(v => v.videoId !== null);

                document.getElementById('loader').style.display = 'none';
                
                if (allVideos.length === 0) {
                    document.getElementById('video-grid').innerHTML = '<div class="col-span-full py-20 text-center text-gray-400">แง! ไม่พบข้อมูลคลิปในสเปรดชีตจ๊ะ</div>';
                }

                renderCategories();
                renderVideos('ทั้งหมด');
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold">แง! โหลดข้อมูลไม่ได้ ลองตรวจสอบการ Publish CSV นะจ๊ะ</p>`;
            }
        }

        function renderCategories() {
            const cats = ['ทั้งหมด', ...new Set(allVideos.map(v => v.category))];
            const bar = document.getElementById('category-bar');
            bar.innerHTML = cats.map(cat => `
                <button onclick="renderVideos('${cat}')" 
                        class="kid-button bg-white text-orange-kid border-4 border-yellow-300 px-6 py-2 rounded-full font-bold whitespace-nowrap hover:bg-yellow-100 transition-colors">
                    ${cat}
                </button>
            `).join('');
        }

        function renderVideos(category) {
            const grid = document.getElementById('video-grid');
            const filtered = category === 'ทั้งหมด' ? allVideos : allVideos.filter(v => v.category === category);
            
            currentPlaylist = filtered;

            grid.innerHTML = filtered.map((v, idx) => `
                <div class="card-pop cursor-pointer h-full" onclick="playVideoAtIndex(${idx})">
                    <div class="bg-white border-[6px] border-white rounded-[2.5rem] overflow-hidden shadow-xl h-full flex flex-col transition-all hover:shadow-2xl">
                        <div class="relative aspect-video bg-gray-100">
                            <img src="${v.thumbnail}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/400x225?text=No+Preview'">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/5 opacity-0 hover:opacity-100 transition-opacity">
                                <div class="bg-white/90 rounded-full p-4 shadow-lg">
                                    <i data-lucide="play" class="w-8 h-8 text-orange-kid fill-current"></i>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 text-center flex-grow flex flex-col justify-between">
                            <h3 class="font-bold text-lg text-gray-700 line-clamp-2 mb-2 leading-tight">${v.title}</h3>
                            <span class="inline-block px-4 py-1 bg-yellow-100 text-orange-600 rounded-full text-xs font-bold self-center">${v.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function playVideoAtIndex(index) {
            if (index < 0 || index >= currentPlaylist.length) return;
            
            currentIndex = index;
            const video = currentPlaylist[currentIndex];
            currentVideo = video;

            document.getElementById('modal-title').textContent = video.title;
            document.getElementById('video-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (!player) {
                player = new YT.Player('player-container', {
                    height: '100%',
                    width: '100%',
                    videoId: video.videoId,
                    playerVars: { 
                        'autoplay': 1, 
                        'rel': 0, 
                        'modestbranding': 1,
                        'origin': window.location.origin
                    },
                    events: { 
                        'onStateChange': (event) => { if (event.data === YT.PlayerState.ENDED) playNext(); } 
                    }
                });
            } else {
                player.loadVideoById(video.videoId);
            }
            updateFavBtn();
        }

        function playNext() {
            if (currentIndex < currentPlaylist.length - 1) playVideoAtIndex(currentIndex + 1);
            else playVideoAtIndex(0);
        }

        function playPrev() {
            if (currentIndex > 0) playVideoAtIndex(currentIndex - 1);
            else playVideoAtIndex(currentPlaylist.length - 1);
        }

        function closeModal() {
            document.getElementById('video-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            if (player) player.stopVideo();
        }

        function goHome() {
            closeModal();
            renderVideos('ทั้งหมด');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleFavoriteCurrent() {
            if (!currentVideo) return;
            const idx = favorites.indexOf(currentVideo.id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(currentVideo.id);
            localStorage.setItem('kiddo_favs', JSON.stringify(favorites));
            updateFavBtn();
        }

        function updateFavBtn() {
            const btn = document.getElementById('modal-fav-btn');
            const isFav = favorites.includes(currentVideo.id);
            btn.className = `kid-button ${isFav ? 'bg-pink-600' : 'bg-pink-400'} text-white px-10 py-3 rounded-full font-bold flex items-center gap-3 text-lg transition-all`;
            btn.querySelector('span').textContent = isFav ? 'หนูชอบเรื่องนี้มากเลย' : 'เก็บไว้ดูอีกนะ';
            lucide.createIcons();
        }

        function openFavs() {
            const favVideos = allVideos.filter(v => favorites.includes(v.id));
            currentPlaylist = favVideos;
            const grid = document.getElementById('video-grid');
            if (favVideos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-24 text-center"><p class="text-7xl mb-6">🧸</p><p class="text-2xl font-bold text-gray-500">ยังไม่มีเรื่องที่หนูชอบเลยจ๊ะ</p></div>`;
            } else {
                renderVideosFromList(favVideos);
            }
        }

        function renderVideosFromList(list) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = list.map((v, idx) => `
                <div class="card-pop cursor-pointer h-full" onclick="playVideoAtIndex(${idx})">
                    <div class="bg-white border-[6px] border-white rounded-[2.5rem] overflow-hidden shadow-xl h-full flex flex-col">
                        <div class="relative aspect-video"><img src="${v.thumbnail}" class="w-full h-full object-cover"></div>
                        <div class="p-5 text-center flex-grow flex flex-col justify-center">
                            <h3 class="font-bold text-lg text-gray-700 line-clamp-1">${v.title}</h3>
                        </div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        window.onload = fetchVideos;
    </script>
</body>
</html>
